<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>KettleFit · Workout Screen Preview</title>
  <link rel="stylesheet" href="styles.css?v=preview1" />
  <style>
    /* Preview-only chrome: switcher to cycle exercises without booting the
       full app, plus a banner so this isn't confused for the real app. */
    .preview-switcher {
      position: sticky; top: 0; z-index: 60;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 8px 12px;
      display: flex; gap: 6px; flex-wrap: wrap; justify-content: center;
    }
    .preview-switcher button {
      font-size: .78rem; padding: 6px 10px;
      background: var(--surface); border: 1px solid var(--border);
      color: var(--muted); border-radius: 8px; cursor: pointer;
    }
    .preview-switcher button.active {
      color: #fff; background: var(--accent); border-color: var(--accent);
    }
    .preview-banner {
      text-align: center; padding: 6px 12px;
      font-size: .75rem; color: var(--muted);
      background: var(--bg); border-bottom: 1px solid var(--border);
    }
  </style>
</head>
<body>
  <div class="preview-switcher">
    <button data-ex="kb_swing" class="active">Swing</button>
    <button data-ex="goblet_squat">Goblet Squat</button>
    <button data-ex="kb_deadlift">Deadlift</button>
    <button data-ex="kb_rdl">RDL</button>
    <button data-ex="kb_turkish_getup">Get-up</button>
    <button data-ex="kb_clean_single">Clean</button>
    <button data-ex="kb_snatch">Snatch</button>
    <button data-ex="kb_press">Press (no anim)</button>
    <button data-ex="kb_row">Row (no anim)</button>
  </div>
  <div class="preview-banner">Workout-screen preview — same DOM, CSS, and Anim module as the live app</div>

  <div id="root"></div>

  <script type="module" src="workout_preview.js?v=preview1"></script>
</body>
</html>
