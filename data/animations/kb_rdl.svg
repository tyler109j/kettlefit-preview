<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280" width="200" height="280">
  <!-- Romanian Deadlift — minimal knee bend, ~2.6s/rep
       Joints: head, shoulder, hip, knee, ankle, hand (bell tracks down leg).
       Movement: stand -> hip hinge w/ slight knee bend -> stand. -->
  <animation id="kb_rdl" cycleMs="2600" loop="true">
    <pose t="0" label="stand">
      <joint name="head"    x="100" y="44"  />
      <joint name="shoulder" x="100" y="74"  />
      <joint name="hip"     x="100" y="135" />
      <joint name="knee"    x="100" y="188" />
      <joint name="ankle"   x="100" y="248" />
      <joint name="hand"    x="100" y="200" />
    </pose>
    <pose t="0.5" label="bottom">
      <joint name="head"    x="100" y="92"  />
      <joint name="shoulder" x="100" y="122" />
      <joint name="hip"     x="108" y="170" />
      <joint name="knee"    x="104" y="195" />
      <joint name="ankle"   x="100" y="248" />
      <joint name="hand"    x="120" y="248" />
    </pose>
  </animation>
</svg>