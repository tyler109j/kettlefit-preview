<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280" width="200" height="280">
  <!-- KB Clean v2 — hike, swing up, redirect into rack position.
       Real clean sequence:
         - Hike: hinged at hips, bell between legs (similar to swing hike).
         - Hip drive: hips extend, bell floats up.
         - Redirect: at apex, elbow tucks forward and up, bell rotates around
           the hand so the body of the bell lands softly on the back of the
           forearm. Bell ends up at rack — elbow tucked to ribs, bell at
           shoulder height, forearm roughly vertical.
         - Rack hold: brief pause with bell at chest.
         - Drop: controlled drop, bell arcs down through legs.
       Previous bug: started standing upright, no hinge in hike position. -->
  <animation id="kb_clean_single" cycleMs="2400" loop="true">
    <!-- Hike: hinged. Bell between legs. -->
    <pose t="0" label="hike">
      <joint name="head"    x="120" y="92"  />
      <joint name="shoulder" x="115" y="118" />
      <joint name="hip"     x="100" y="138" />
      <joint name="knee"    x="103" y="184" />
      <joint name="ankle"   x="100" y="248" />
      <joint name="hand"    x="115" y="222" />
    </pose>
    <!-- Hip drive: torso rising, bell floating up out of the legs. -->
    <pose t="0.22" label="hip-drive">
      <joint name="head"    x="114" y="74"  />
      <joint name="shoulder" x="110" y="100" />
      <joint name="hip"     x="100" y="134" />
      <joint name="knee"    x="101" y="180" />
      <joint name="ankle"   x="100" y="248" />
      <joint name="hand"    x="112" y="170" />
    </pose>
    <!-- Float: bell at chest height, body extending. -->
    <pose t="0.4" label="float">
      <joint name="head"    x="106" y="56"  />
      <joint name="shoulder" x="104" y="82"  />
      <joint name="hip"     x="100" y="132" />
      <joint name="knee"    x="100" y="178" />
      <joint name="ankle"   x="100" y="248" />
      <joint name="hand"    x="108" y="118" />
    </pose>
    <!-- Rack: bell at shoulder, elbow tucked. Hand moves inward toward midline
         (we approximate this by hand x ~ 92, since the elbow wraps around to
         tuck the bell against the forearm). -->
    <pose t="0.5" label="rack">
      <joint name="head"    x="100" y="44"  />
      <joint name="shoulder" x="100" y="74"  />
      <joint name="hip"     x="100" y="130" />
      <joint name="knee"    x="100" y="178" />
      <joint name="ankle"   x="100" y="248" />
      <joint name="hand"    x="92"  y="92"  />
    </pose>
    <!-- Hold rack briefly. -->
    <pose t="0.62" label="rack-hold">
      <joint name="head"    x="100" y="44"  />
      <joint name="shoulder" x="100" y="74"  />
      <joint name="hip"     x="100" y="130" />
      <joint name="knee"    x="100" y="178" />
      <joint name="ankle"   x="100" y="248" />
      <joint name="hand"    x="92"  y="92"  />
    </pose>
    <!-- Drop: bell arcs back down. Hips hinging. -->
    <pose t="0.78" label="drop">
      <joint name="head"    x="108" y="64"  />
      <joint name="shoulder" x="105" y="88"  />
      <joint name="hip"     x="100" y="134" />
      <joint name="knee"    x="100" y="182" />
      <joint name="ankle"   x="100" y="248" />
      <joint name="hand"    x="115" y="155" />
    </pose>
    <pose t="0.92" label="re-hike">
      <joint name="head"    x="120" y="92"  />
      <joint name="shoulder" x="115" y="118" />
      <joint name="hip"     x="100" y="138" />
      <joint name="knee"    x="103" y="184" />
      <joint name="ankle"   x="100" y="248" />
      <joint name="hand"    x="118" y="222" />
    </pose>
  </animation>
</svg>