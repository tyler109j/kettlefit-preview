<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280" width="200" height="280">
  <!-- Goblet Squat v4 — fixes from your manual:
       - Bell stays AT CHEST throughout the movement (not floating down
         to the belly). Hand y stays ~108-115.
       - "Elbows inside knees" at bottom — we represent this by the
         hand staying high even when hips are low.
       - The depth is correct from v3, but the bell position was wrong. -->
  <animation id="goblet_squat" cycleMs="2400" loop="true">
    <pose t="0" label="stand">
      <joint name="head"    x="100" y="44"  />
      <joint name="shoulder" x="100" y="74"  />
      <joint name="hip"     x="100" y="140" />
      <joint name="knee"    x="100" y="188" />
      <joint name="ankle"   x="100" y="248" />
      <joint name="hand"    x="100" y="100" />
    </pose>
    <!-- Mid-descent. Bell still at chest. -->
    <pose t="0.22" label="mid-descent">
      <joint name="head"    x="98"  y="86"  />
      <joint name="shoulder" x="99"  y="108" />
      <joint name="hip"     x="96"  y="180" />
      <joint name="knee"    x="116" y="210" />
      <joint name="ankle"   x="100" y="248" />
      <joint name="hand"    x="100" y="108" />
    </pose>
    <!-- Bottom of squat: deep. Bell STAYS at chest (hand y=112).
         Hip below knee line. Knees forward of ankles.
         Torso upright thanks to counterweight at chest.
         Elbows would track inside knees (we approximate by
         showing the hand still pinned to chest level). -->
    <pose t="0.42" label="bottom">
      <joint name="head"    x="94"  y="148" />
      <joint name="shoulder" x="96"  y="164" />
      <joint name="hip"     x="92"  y="222" />
      <joint name="knee"    x="128" y="210" />
      <joint name="ankle"   x="100" y="248" />
      <joint name="hand"    x="100" y="112" />
    </pose>
    <pose t="0.5" label="hold-bottom">
      <joint name="head"    x="94"  y="148" />
      <joint name="shoulder" x="96"  y="164" />
      <joint name="hip"     x="92"  y="222" />
      <joint name="knee"    x="128" y="210" />
      <joint name="ankle"   x="100" y="248" />
      <joint name="hand"    x="100" y="112" />
    </pose>
    <pose t="0.7" label="mid-ascent">
      <joint name="head"    x="98"  y="86"  />
      <joint name="shoulder" x="99"  y="108" />
      <joint name="hip"     x="96"  y="180" />
      <joint name="knee"    x="116" y="210" />
      <joint name="ankle"   x="100" y="248" />
      <joint name="hand"    x="100" y="108" />
    </pose>
    <pose t="1.0" label="stand">
      <joint name="head"    x="100" y="44"  />
      <joint name="shoulder" x="100" y="74"  />
      <joint name="hip"     x="100" y="140" />
      <joint name="knee"    x="100" y="188" />
      <joint name="ankle"   x="100" y="248" />
      <joint name="hand"    x="100" y="100" />
    </pose>
  </animation>
</svg>