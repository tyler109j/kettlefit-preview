<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280" width="200" height="280">
  <!-- Kettlebell Deadlift — bell on floor between feet, ~2.6s/rep
       Joints: head, shoulder, hip, knee, ankle, hand (bell at floor).
       Movement: floor -> standing plank -> floor. -->
  <animation id="kb_deadlift" cycleMs="2600" loop="true">
    <pose t="0" label="floor">
      <joint name="head"    x="100" y="110" />
      <joint name="shoulder" x="100" y="140" />
      <joint name="hip"     x="100" y="170" />
      <joint name="knee"    x="106" y="200" />
      <joint name="ankle"   x="100" y="248" />
      <joint name="hand"    x="100" y="252" />
    </pose>
    <pose t="0.25" label="pass-knee">
      <joint name="head"    x="100" y="78"  />
      <joint name="shoulder" x="100" y="108" />
      <joint name="hip"     x="100" y="155" />
      <joint name="knee"    x="103" y="190" />
      <joint name="ankle"   x="100" y="248" />
      <joint name="hand"    x="100" y="220" />
    </pose>
    <pose t="0.5" label="lockout">
      <joint name="head"    x="100" y="44"  />
      <joint name="shoulder" x="100" y="74"  />
      <joint name="hip"     x="100" y="135" />
      <joint name="knee"    x="100" y="188" />
      <joint name="ankle"   x="100" y="248" />
      <joint name="hand"    x="100" y="248" />
    </pose>
    <pose t="0.75" label="descent">
      <joint name="head"    x="100" y="78"  />
      <joint name="shoulder" x="100" y="108" />
      <joint name="hip"     x="100" y="155" />
      <joint name="knee"    x="103" y="190" />
      <joint name="ankle"   x="100" y="248" />
      <joint name="hand"    x="100" y="220" />
    </pose>
  </animation>
</svg>