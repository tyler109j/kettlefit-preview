<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 280" width="320" height="280">
  <!-- Turkish Get-up — full up-and-down cycle for seamless loop.
       Half-cycle (t=0 → t=0.5): rising from lie-flat to stand.
       Half-cycle (t=0.5 → t=1.0): descending back from stand to lie-flat.
       t=0 and t=1.0 are byte-identical (lie-flat) so the loop has zero pop.

       Side view, viewBox 320x280. Floor at y≈240. Standing head at y=44.
  -->
  <animation id="kb_turkish_getup" cycleMs="8000" loop="true">

    <!-- ===== ASCENT (t=0 → t=0.5) ===== -->

    <!-- 1. Lying flat. Body horizontal at y=232. Bell overhead (hand above shoulder). -->
    <pose t="0" label="lie-flat">
      <joint name="head"    x="46"  y="232" />
      <joint name="shoulder" x="78"  y="232" />
      <joint name="hip"     x="160" y="232" />
      <joint name="knee"    x="180" y="170" />
      <joint name="ankle"   x="180" y="232" />
      <joint name="hand"    x="78"  y="140" />
    </pose>

    <!-- 2. Rolled to elbow. Hips rising. -->
    <pose t="0.10" label="on-elbow">
      <joint name="head"    x="60"  y="200" />
      <joint name="shoulder" x="92"  y="200" />
      <joint name="hip"     x="180" y="212" />
      <joint name="knee"    x="200" y="148" />
      <joint name="ankle"   x="200" y="212" />
      <joint name="hand"    x="92"  y="108" />
    </pose>

    <!-- 3. Sit tall. Propped on one hand. -->
    <pose t="0.20" label="sit-tall">
      <joint name="head"    x="92"  y="138" />
      <joint name="shoulder" x="110" y="158" />
      <joint name="hip"     x="170" y="220" />
      <joint name="knee"    x="180" y="160" />
      <joint name="ankle"   x="180" y="220" />
      <joint name="hand"    x="110" y="68"  />
    </pose>

    <!-- 4. Half-kneel. Front knee on floor, back leg folded. -->
    <pose t="0.30" label="half-kneel">
      <joint name="head"    x="100" y="98"  />
      <joint name="shoulder" x="112" y="120" />
      <joint name="hip"     x="140" y="190" />
      <joint name="knee"    x="148" y="232" />
      <joint name="ankle"   x="210" y="232" />
      <joint name="hand"    x="112" y="56"  />
    </pose>

    <!-- 5. Lunge up. Front foot planted, back leg lifting. -->
    <pose t="0.42" label="lunge-up">
      <joint name="head"    x="108" y="60"  />
      <joint name="shoulder" x="118" y="84"  />
      <joint name="hip"     x="138" y="148" />
      <joint name="knee"    x="148" y="208" />
      <joint name="ankle"   x="180" y="248" />
      <joint name="hand"    x="118" y="32"  />
    </pose>

    <!-- 6. Standing tall. Bell overhead. (Top of the arc.) -->
    <pose t="0.5" label="stand">
      <joint name="head"    x="110" y="44"  />
      <joint name="shoulder" x="118" y="74"  />
      <joint name="hip"     x="130" y="138" />
      <joint name="knee"    x="138" y="194" />
      <joint name="ankle"   x="140" y="248" />
      <joint name="hand"    x="113" y="26"  />
    </pose>

    <!-- ===== DESCENT (t=0.5 → t=1.0) — mirror of ascent ===== -->

    <!-- 7. Back to lunge-up (mirror of t=0.42). -->
    <pose t="0.58" label="lunge-up">
      <joint name="head"    x="108" y="60"  />
      <joint name="shoulder" x="118" y="84"  />
      <joint name="hip"     x="138" y="148" />
      <joint name="knee"    x="148" y="208" />
      <joint name="ankle"   x="180" y="248" />
      <joint name="hand"    x="118" y="32"  />
    </pose>

    <!-- 8. Back to half-kneel (mirror of t=0.30). -->
    <pose t="0.70" label="half-kneel">
      <joint name="head"    x="100" y="98"  />
      <joint name="shoulder" x="112" y="120" />
      <joint name="hip"     x="140" y="190" />
      <joint name="knee"    x="148" y="232" />
      <joint name="ankle"   x="210" y="232" />
      <joint name="hand"    x="112" y="56"  />
    </pose>

    <!-- 9. Back to sit-tall (mirror of t=0.20). -->
    <pose t="0.80" label="sit-tall">
      <joint name="head"    x="92"  y="138" />
      <joint name="shoulder" x="110" y="158" />
      <joint name="hip"     x="170" y="220" />
      <joint name="knee"    x="180" y="160" />
      <joint name="ankle"   x="180" y="220" />
      <joint name="hand"    x="110" y="68"  />
    </pose>

    <!-- 10. Back to on-elbow (mirror of t=0.10). -->
    <pose t="0.90" label="on-elbow">
      <joint name="head"    x="60"  y="200" />
      <joint name="shoulder" x="92"  y="200" />
      <joint name="hip"     x="180" y="212" />
      <joint name="knee"    x="200" y="148" />
      <joint name="ankle"   x="200" y="212" />
      <joint name="hand"    x="92"  y="108" />
    </pose>

    <!-- 11. Lie-flat again (mirror of t=0). Byte-identical to first pose for seamless loop. -->
    <pose t="1.0" label="lie-flat">
      <joint name="head"    x="46"  y="232" />
      <joint name="shoulder" x="78"  y="232" />
      <joint name="hip"     x="160" y="232" />
      <joint name="knee"    x="180" y="170" />
      <joint name="ankle"   x="180" y="232" />
      <joint name="hand"    x="78"  y="140" />
    </pose>
  </animation>
</svg>
